<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 💖</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Background image */
    .bg-image {
      position: absolute;
      inset: 0;
      background: url('eye.png') center/cover no-repeat;
      opacity: 0;
      transition: opacity 3s ease-in-out;
      z-index: 0;
    }

    .bg-image.show {
      opacity: 1;
    }

    /* Dark overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      opacity: 0;
      transition: opacity 3s ease-in-out;
      z-index: 1;
    }

    .overlay.show {
      opacity: 1;
    }

    /* Bottom card */
    .container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      padding: 20px 18px;
      width: 90%;
      max-width: 350px;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(5px);
      border-radius: 22px;
      color: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .heart {
      font-size: 1.8rem;
      animation: pulse 1.5s infinite;
      display: inline-block;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.35);
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 18px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 1.8s ease;
    }

    p.show {
      opacity: 1;
      transform: translateY(0);
    }

    button {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      background: #ff4b7d;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(255, 75, 125, 0.35);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    button:hover {
      transform: scale(1.06);
      background: #ff2e68;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Floating hearts */
    .floating-heart {
      position: absolute;
      color: rgba(255, 255, 255, 0.85);
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-20vh) scale(1.3);
        opacity: 0;
      }
    }

    /* Rotate horizontal image for phones */
    @media (max-width: 768px) {
      .bg-image {
        top: 50%;
        left: 50%;
        width: 100vh;
        height: 100vw;
        inset: unset;
        background: url('cap3.png') center/contain no-repeat;
        transform: translate(-50%, -50%) rotate(90deg);
      }

      .container {
        bottom: 20px;
        width: 88%;
        padding: 18px 15px;
      }

      h1 {
        font-size: 1.8rem;
      }

      p {
        font-size: 0.95rem;
      }

      button {
        padding: 12px 24px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg-image" id="bgImage"></div>
  <div class="overlay" id="overlay"></div>

  <div class="container">
    <div class="heart">💖</div>
    <h1>Happy Birthday 💖</h1>
    <p id="message">
      To the most special person ✨<br>
      You make life more beautiful 🌸
    </p>
    <button onclick="showSurprise()">Open Surprise 🎁</button>
  </div>

  <script>
    function showSurprise() {
      document.getElementById("bgImage").classList.add("show");
      document.getElementById("overlay").classList.add("show");
      document.getElementById("message").classList.add("show");

      createHearts();
    }

    function createHearts() {
      for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.classList.add("floating-heart");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (4 + Math.random() * 3) + "s";
        heart.style.fontSize = (15 + Math.random() * 25) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 7000);
      }
    }
  </script>

</body>
</html>
